    <script>
        (function () {
            const svg = document.getElementById("archSvg");
            const zoomInBtn = document.getElementById("zoomInBtn");
            const zoomOutBtn = document.getElementById("zoomOutBtn");
            const zoomResetBtn = document.getElementById("zoomResetBtn");
            if (!svg) return;

            const initialViewBox = { x: 0, y: 0, width: 2400, height: 1160 };
            let currentZoom = 0.9;

            function renderViewBox() {
                const width = initialViewBox.width / currentZoom;
                const height = initialViewBox.height / currentZoom;
                const maxX = initialViewBox.width - width;
                const maxY = initialViewBox.height - height;
                const x = Math.max(0, Math.min(viewBox.x, maxX));
                const y = Math.max(0, Math.min(viewBox.y, maxY));
                viewBox.x = x;
                viewBox.y = y;
                viewBox.width = width;
                viewBox.height = height;
                svg.setAttribute("viewBox", `${x} ${y} ${width} ${height}`);
                if (zoomResetBtn) zoomResetBtn.textContent = `${Math.round(currentZoom * 100)}%`;
            }

            function setZoom(next) {
                const bounded = Math.max(0.5, Math.min(2.2, next));
                const cx = viewBox.x + viewBox.width / 2;
                const cy = viewBox.y + viewBox.height / 2;
                currentZoom = bounded;
                viewBox.width = initialViewBox.width / currentZoom;
                viewBox.height = initialViewBox.height / currentZoom;
                viewBox.x = cx - viewBox.width / 2;
                viewBox.y = cy - viewBox.height / 2;
                renderViewBox();
            }

            const viewBox = { ...initialViewBox };
            setZoom(0.9);
            viewBox.x = 0;
            viewBox.y = 0;
            renderViewBox();

            if (zoomInBtn) zoomInBtn.addEventListener("click", () => setZoom(currentZoom + 0.1));
            if (zoomOutBtn) zoomOutBtn.addEventListener("click", () => setZoom(currentZoom - 0.1));
            if (zoomResetBtn) {
                zoomResetBtn.addEventListener("click", () => {
                    currentZoom = 0.9;
                    viewBox.x = 0;
                    viewBox.y = 0;
                    renderViewBox();
                });
            }

            let dragging = false;
            let start = { x: 0, y: 0 };
            let startBox = { x: 0, y: 0 };
            svg.style.cursor = "grab";

            svg.addEventListener("mousedown", (e) => {
                if (e.button !== 0) return;
                dragging = true;
                start = { x: e.clientX, y: e.clientY };
                startBox = { x: viewBox.x, y: viewBox.y };
                svg.style.cursor = "grabbing";
            });

            window.addEventListener("mouseup", () => {
                dragging = false;
                svg.style.cursor = "grab";
            });

            window.addEventListener("mousemove", (e) => {
                if (!dragging) return;
                const dx = (e.clientX - start.x) * (viewBox.width / svg.clientWidth);
                const dy = (e.clientY - start.y) * (viewBox.height / svg.clientHeight);
                viewBox.x = startBox.x - dx;
                viewBox.y = startBox.y - dy;
                renderViewBox();
            });
        })();
    </script>
